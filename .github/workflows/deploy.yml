name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Verify build output
        run: |
          echo "=== wrangler version ==="
          npx wrangler --version
          echo "=== build/client contents ==="
          ls -la build/client/ | head -20

      - name: Fix users.role CHECK constraint (one-time)
        run: |
          # Test if 'ae' role is already allowed
          TEST=$(npx wrangler d1 execute cf-se-blog-db --remote --command \
            "INSERT INTO users (id, email, display_name, role) VALUES ('__ae_check__', '__ae_check__@test', '__test__', 'ae')" 2>&1) || true
          npx wrangler d1 execute cf-se-blog-db --remote --command \
            "DELETE FROM users WHERE id = '__ae_check__'" 2>&1 || true
          if echo "$TEST" | grep -qi "CHECK constraint"; then
            echo "🔧 AE role not yet allowed — applying fix..."
            npx wrangler d1 execute cf-se-blog-db --remote --file=scripts/fix_ae_role_check.sql
          else
            echo "✅ AE role already allowed, skipping."
          fi
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Apply D1 migrations
        run: npx wrangler d1 migrations apply cf-se-blog-db --remote
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Deploy to Pages
        run: |
          COMMIT_HASH=$(git rev-parse --short HEAD)
          npx wrangler pages deploy ./build/client --project-name=cf-se-blog \
            --commit-hash="$(git rev-parse HEAD)" \
            --commit-message="deploy ${COMMIT_HASH}" 2>&1
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
