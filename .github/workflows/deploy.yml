name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Verify build output
        run: |
          echo "=== wrangler version ==="
          npx wrangler --version
          echo "=== build/client contents ==="
          ls -la build/client/ | head -20

      - name: Fix broken FK references (one-time)
        run: |
          # Check if any table still has FK references to users_old (from ae role fix)
          CHECK=$(npx wrangler d1 execute cf-se-blog-db --remote --command \
            "SELECT COUNT(*) as cnt FROM sqlite_master WHERE sql LIKE '%users_old%'" 2>&1) || true
          if echo "$CHECK" | grep -qE '"cnt": [1-9]'; then
            echo "🔧 Broken FK references found — fixing..."
            npx wrangler d1 execute cf-se-blog-db --remote --file=scripts/fix_fk_references.sql
            echo "✅ FK references fixed."
          else
            echo "✅ FK references OK, skipping."
          fi
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Apply D1 migrations
        run: npx wrangler d1 migrations apply cf-se-blog-db --remote
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Deploy to Pages
        run: |
          COMMIT_HASH=$(git rev-parse --short HEAD)
          npx wrangler pages deploy ./build/client --project-name=cf-se-blog \
            --commit-hash="$(git rev-parse HEAD)" \
            --commit-message="deploy ${COMMIT_HASH}" 2>&1
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
